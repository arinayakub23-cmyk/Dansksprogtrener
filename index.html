<style>

.nb{flex:1;padding:12px;border-radius:12px;background:#f3f4f6;color:#111;font-size:15px;font-weight:500}

.nb:disabled{opacity:.4}

<body>
<div id="app">

  <div class="wrap">
    <div class="tabs" id="tabs"></div>

</div>
<script>
var T={A:{icon:"👨‍🍳",label:"A: Arbejde",person:"Nanna er kok",cards:[{label:"By",scene:"Nanna arbejder i en by i Danmark.",wh:["Hvor","Hvilken"],hint:["Hvor?","Hvilken by?"],ex:["Hvor arbejder Nanna?","Arbejder hun i København?"]},{label:"Arbejdstid",scene:"Nanna møder på arbejde klokken 7.",wh:["Hvornår","Hvad tid"],hint:["Hvornår?","Hvad tid?"],ex:["Hvornår møder hun på arbejde?","Møder hun klokken 7?"]},{label:"Arbejdsplads",scene:"Nanna arbejder på et hotel som kok.",wh:["Hvor"],hint:["Hvor?","Hvad slags sted?"],ex:["Hvor arbejder hun?","Arbejder hun på et hotel?"]},{label:"Frokostpause",scene:"Nanna har frokostpause midt på dagen.",wh:["Hvornår","Hvad"],hint:["Hvornår?","Hvad spiser hun?"],ex:["Hvornår har hun pause?","Hvad spiser hun?"]},{label:"Løn",scene:"Nanna tjener penge som kok på hotellet.",wh:["Hvor meget"],hint:["Hvor meget?"],ex:["Hvor meget tjener hun?","Hvad tjener hun i timen?"]},{label:"Sprog/kolleger",scene:"Nanna taler dansk og arbejder med kolleger.",wh:["Hvad","Hvem","Hvor mange"],hint:["Hvad sprog?","Hvem?"],ex:["Hvad sprog taler hun?","Taler hun dansk?"]}]},B:{icon:"⚽",label:"B: Fritid",person:"Jonas går til fodbold",cards:[{label:"Sted/by",scene:"Jonas spiller fodbold i en by i Danmark.",wh:["Hvor","Hvilken"],hint:["Hvor?","Hvilken by?"],ex:["Hvor spiller han fodbold?"]},{label:"Klub",scene:"Jonas er med i en fodboldklub.",wh:["Hvilken","Hvad hedder"],hint:["Hvilken klub?"],ex:["Hvilken klub spiller han i?"]},{label:"Dage/tid",scene:"Jonas går til fodbold på bestemte dage.",wh:["Hvornår","Hvilken dag"],hint:["Hvornår?","Hvilken dag?"],ex:["Hvornår spiller han fodbold?"]},{label:"Sammen med",scene:"Jonas spiller fodbold med andre spillere.",wh:["Hvem"],hint:["Hvem?"],ex:["Hvem spiller han sammen med?"]},{label:"Pris",scene:"Det koster penge at spille i klubben.",wh:["Hvad koster","Hvor meget"],hint:["Hvad koster det?"],ex:["Hvad koster det?"]},{label:"Transport",scene:"Jonas kommer til træning på en bestemt måde.",wh:["Hvordan"],hint:["Hvordan?"],ex:["Hvordan kommer han til fodbold?"]}]},C:{icon:"🏠",label:"C: Bolig",person:"John og Emma bor i et hus",cards:[{label:"By",scene:"John og Emma bor i en by i Danmark.",wh:["Hvilken","Hvor"],hint:["Hvilken by?"],ex:["Hvilken by bor de i?"]},{label:"Adresse",scene:"Huset har adressen Landevejen 11.",wh:["Hvad","Hvilken"],hint:["Hvad er adressen?"],ex:["Hvad er deres adresse?"]},{label:"Værelser",scene:"Huset har flere rum og måske en kælder.",wh:["Hvor mange"],hint:["Hvor mange?"],ex:["Hvor mange værelser har de?"]},{label:"Have",scene:"Huset har en have.",wh:["Har de","Hvor stor"],hint:["Har de en have?"],ex:["Har de en have?","Hvor stor er haven?"]},{label:"Naboer",scene:"John og Emma har naboer i nærheden.",wh:["Hvem","Hvor mange"],hint:["Hvem?","Hvor mange?"],ex:["Har de gode naboer?"]},{label:"Husleje",scene:"De betaler husleje eller ejer huset.",wh:["Hvor meget","Ejer/lejer"],hint:["Hvor meget?"],ex:["Hvor meget betaler de?"]}]},D:{icon:"📚",label:"D: Skole",person:"Karla går i skole",cards:[{label:"Sted/by",scene:"Karla går i skole i en by.",wh:["Hvor","Hvilken"],hint:["Hvor?"],ex:["Hvor går Karla i skole?"]},{label:"Dage/tid",scene:"Karla møder i skole på bestemte tider.",wh:["Hvornår","Hvad tid"],hint:["Hvornår?"],ex:["Hvornår møder hun?"]},{label:"Elever",scene:"Der er elever i Karlas klasse.",wh:["Hvor mange"],hint:["Hvor mange?"],ex:["Hvor mange elever er der?"]},{label:"Lærer",scene:"Karla har en eller flere lærere.",wh:["Hvad","Hvem","Hvor gammel"],hint:["Hvad hedder læreren?"],ex:["Hvad hedder læreren?"]},{label:"Pauser",scene:"Eleverne har pauser i løbet af skoledagen.",wh:["Hvornår","Hvad","Hvor lang tid"],hint:["Hvornår?","Hvad?"],ex:["Hvornår har de pause?"]},{label:"Transport",scene:"Karla bruger en bestemt transport til skole.",wh:["Hvordan"],hint:["Hvordan?"],ex:["Hvordan kommer de i skole?"]}]},E:{icon:"🌱",label:"E: Praktik",person:"Layla er i praktik",cards:[{label:"Sted/by",scene:"Layla er i praktik et sted i Danmark.",wh:["Hvor"],hint:["Hvor?"],ex:["Hvor er hun i praktik?"]},{label:"Arbejdstid",scene:"Layla arbejder på bestemte tidspunkter.",wh:["Hvad tid","Hvornår"],hint:["Hvad tid?"],ex:["Hvad tid går hun i praktik?"]},{label:"Arbejdsopgaver",scene:"Layla laver forskellige opgaver i praktikken.",wh:["Hvad"],hint:["Hvad laver hun?"],ex:["Hvad laver hun i praktik?"]},{label:"Frokostpause",scene:"Layla spiser i pausen i praktikken.",wh:["Hvad","Hvornår"],hint:["Hvad spiser hun?"],ex:["Hvad spiser hun?"]},{label:"Transport",scene:"Layla bruger en bestemt transport til praktik.",wh:["Hvordan","Hvilken"],hint:["Hvordan?"],ex:["Hvilken transport bruger hun?"]},{label:"Hvor lang tid",scene:"Layla er i praktik i en bestemt periode.",wh:["Hvor lang tid"],hint:["Hvor lang tid?"],ex:["Hvor lang tid er hun i praktik?"]}]},F:{icon:"🦁",label:"F: Fritid (zoo)",person:"Mille er i Zoologisk Have",cards:[{label:"By",scene:"Mille besøger en zoologisk have i en by.",wh:["Hvilken","Hvor"],hint:["Hvilken by?"],ex:["Hvilken by er zoo i?"]},{label:"Dage/tid",scene:"Mille er i zoo på en bestemt dag og tid.",wh:["Hvornår"],hint:["Hvornår?"],ex:["Hvornår er hun i zoo?"]},{label:"Sammen med",scene:"Mille er i zoo med nogen.",wh:["Hvem"],hint:["Hvem?"],ex:["Hvem er hun i zoo med?"]},{label:"Aktiviteter",scene:"Der er aktiviteter og dyr i den zoologiske have.",wh:["Hvad"],hint:["Hvad laver hun?"],ex:["Hvad laver hun i zoo?"]},{label:"Mad/drikke",scene:"Mille spiser og drikker noget i zoo.",wh:["Hvad"],hint:["Hvad spiser hun?"],ex:["Hvad spiser hun?"]},{label:"Pris",scene:"Det koster penge at komme ind i zoo.",wh:["Hvad koster","Hvor meget"],hint:["Hvad koster det?"],ex:["Hvad koster det?"]}]}};
var FB={god:{bg:"#d1fae5",fg:"#065f46",br:"#6ee7b7"},ok:{bg:"#fef3c7",fg:"#78350f",br:"#fcd34d"},fejl:{bg:"#fee2e2",fg:"#7f1d1d",br:"#fca5a5"},load:{bg:"#f3f4f6",fg:"#6b7280",br:"#e5e7eb"}};
var tg=window.Telegram&&window.Telegram.WebApp;
var cT="A",cC=0,ans={},inp={},exOpen=false;
if(tg){tg.ready();tg.expand();}
function dc(){
  var t=T[cT],c=t.cards[cC],k=cT+"_"+cC;
  var dn=Object.keys(ans).filter(function(x){return x.indexOf(cT+"_")===0;}).length;
  var tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML=Object.keys(T).map(function(k){var v=T[k];return'<button class="tab'+(k===cT?" on":"")+'" onclick="sT(\''+k+'\')">'+v.icon+" "+k+"</button>";}).join("");
  document.getElementById("plbl").textContent=t.person;
  document.getElementById("pcnt").textContent=dn+"/"+t.cards.length;
  document.getElementById("pfill").style.width=(dn/t.cards.length*100)+"%";
  document.getElementById("dots").innerHTML=t.cards.map(function(_,i){
    var k2=cT+"_"+i,s=ans[k2],dc2=!s?"#d1d5db":s==="god"?"#10b981":s==="ok"?"#f59e0b":"#ef4444";
    return'<button class="dbtn'+(i===cC?" on":"")+'" onclick="sC('+i+')">'+(i+1)+(s?'<span class="dm" style="background:'+dc2+'"></span>':"")+"</button>";
  }).join("");
  document.getElementById("cnum").textContent="Kort "+(cC+1)+" af "+t.cards.length;
  document.getElementById("ctit").textContent=c.label;
  document.getElementById("stxt").textContent=c.scene;
  document.getElementById("chips").innerHTML=c.wh.map(function(w){return'<span class="cwh">'+w+"</span>";}).join("")+c.hint.map(function(h){return'<span class="ch">'+h+"</span>";}).join("");
  document.getElementById("qi").value=inp[k]||"";
  document.getElementById("fb").style.display="none";
  document.getElementById("exbox").innerHTML=c.ex.map(function(e){return'<div class="exi"><strong style="color:#374151">→</strong> '+e+"</div>";}).join("");
  document.getElementById("exbox").style.display="none";
  document.getElementById("extog").textContent="▼ Vis eksempler";
  exOpen=false;
  document.getElementById("pb").disabled=cC===0;
  document.getElementById("nb2").disabled=cC===t.cards.length-1;
  document.getElementById("nb2").textContent=cC===t.cards.length-1?"Afslut ✓":"Næste →";
}
function sT(k){cT=k;cC=0;dc();if(tg&&tg.HapticFeedback)tg.HapticFeedback.impactOccurred("light");}
function sC(i){cC=i;dc();}
function goNext(){if(cC<T[cT].cards.length-1){cC++;dc();}}
function goPrev(){if(cC>0){cC--;dc();}}
function doEx(){exOpen=!exOpen;document.getElementById("exbox").style.display=exOpen?"block":"none";document.getElementById("extog").textContent=exOpen?"▲ Skjul eksempler":"▼ Vis eksempler";}
document.getElementById("qi").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doCheck();}});
async function doCheck(){
  var k=cT+"_"+cC,c=T[cT].cards[cC],val=document.getElementById("qi").value.trim();
  inp[k]=val;
  var btn=document.getElementById("cbtn"),btxt=document.getElementById("btxt");
  if(!val){showFB({score:"fejl",simple:"Skriv venligst et spørgsmål først."});return;}
  btn.disabled=true;
  btxt.innerHTML='<span class="spin"></span> Tjekker…';
  showFB({score:"load",simple:"AI tjekker dit spørgsmål…"});
  var prompt='Du er dansklærer. Eleven øver modultest.dk A1-A2.\nSituation: "'+c.scene+'"\nTema: "'+c.label+'"\nSpørgsmål: "'+val+'"\nSvar KUN JSON uden markdown:\n{"score":"god","relevant":true,"grammatik":"1 sætning om grammatik","fejl":"fejl eller tom streng","forbedring":"korrekt version","ros":"ros eller tom streng"}\nscore god = korrekt dansk + spørgsmålstegn + rigtig ordstilling (hv-ord+verbum+subjekt)\nscore ok = forståeligt men har fejl\nscore fejl = forkert grammatik/ordstilling/mangler spørgsmålstegn/ikke dansk/ikke relevant';
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:prompt}]})});
    var data=await res.json();
    var raw=data.content.map(function(i){return i.text||"";}).join("");
    var j=JSON.parse(raw.replace(/```json|```/g,"").trim());
    ans[k]=j.score;dc();showFB(j);
    if(tg&&tg.HapticFeedback){if(j.score==="god")tg.HapticFeedback.notificationOccurred("success");else if(j.score==="fejl")tg.HapticFeedback.notificationOccurred("error");else tg.HapticFeedback.notificationOccurred("warning");}
  }catch(e){showFB({score:"fejl",simple:"Kunne ikke forbinde til AI. Prøv igen."});}
  btn.disabled=false;btxt.textContent="Tjek spørgsmål ✓";
}
function showFB(j){
  var fb=document.getElementById("fb"),col=FB[j.score]||FB.load;
  fb.style.display="block";fb.style.background=col.bg;fb.style.color=col.fg;fb.style.border="1px solid "+col.br;
  if(j.simple){fb.innerHTML=j.simple;return;}
  var h='<div class="fbt">'+(j.score==="god"?(j.ros||"✓ Godt spørgsmål!"):j.score==="ok"?"~ Næsten rigtigt!":"✗ Prøv igen")+(j.relevant===false?" — passer ikke til temaet":"")+"</div>";
  if(j.grammatik)h+='<div class="fbs" style="border-top:1px solid '+col.br+'"><div class="fbl">Grammatik</div>'+j.grammatik+"</div>";
  if(j.fejl)h+='<div class="fbs" style="border-top:1px solid '+col.br+'"><div class="fbl">Fejl</div>'+j.fejl+"</div>";
  if(j.forbedring&&j.score!=="god")h+='<div class="fbs" style="border-top:1px solid '+col.br+'"><div class="fbl">Bedre version</div><strong style="font-size:15px">'+j.forbedring+"</strong></div>";
  fb.innerHTML=h;
}
dc();
</script>
